<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home|Github</title>
    <!-- Daisy ui +tailwind css -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- Font AweSome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
 <!-- Font Geist -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<!-- Styles -->
 <link rel="stylesheet" href="styles/style.css">
</head>
<body>  
    <!-- navbar -->
  <nav class="navbar bg-base-100 shadow-sm px-4 md:px-10 flex flex-wrap justify-between items-center">
  
  <!--  -->
  <div class="flex flex-col sm:flex-row items-center gap-1 sm:gap-2">
    <img class="w-10 h-10" src="./assets/github-logo.png" alt="GitHub Logo">
    <a class="text-xl font-bold">GitHub Issues Tracker</a>
  </div>

  
  <div class="flex flex-col sm:flex-row items-center gap-2 mt-2 sm:mt-0 w-full sm:w-auto">
    <div class="flex items-center gap-2 w-full sm:w-auto">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="search-input" type="text" placeholder="Search Issues..." class="input input-bordered w-full sm:w-auto">
    </div>

    <button class="btn btn-primary flex items-center gap-1 justify-center w-full sm:w-auto">
      <i class="fa-solid fa-plus"></i> New Issue
    </button>
  </div>

</nav>
<!-- Header -->

<header class="flex items-center justify-between p-4  bg-base-100 shadow-sm px-10 mt-4">
  <div class="flex items-center gap-3">
    <img class="w-10 h-10" src="./assets/Aperture.png" alt="Logo">

    <div class="flex flex-col">
      <p id="total-issues" class="font-bold">50 Issues</p>
      <p class="text-sm text-gray-500">Track and manage your project issues</p>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <p class="flex items-center gap-1">
      <img class="w-4 h-4" src="./assets/Open-Status.png" alt="">
      Open
    </p>
    <p class="flex items-center gap-1">
      <img class="w-4 h-4" src="./assets/Closed- Status .png" alt="">
      Closed
    </p>
  </div>
</header>
    <!-- Tab Section -->
   <div id="tabs-container"></div>
<div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-5 px-4"></div></div>
    </div>

    <!-- Modal -->
<dialog id="issue_modal" class="modal">
  <div class="modal-box relative">

    <!-- Close button with icon -->
    <form method="dialog">
      <button class="btn btn-sm btn-circle absolute right-2 top-2">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </form>

    <!-- Modal content -->
    <div id="modal-content"></div>

  </div>

  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>

<!--  loding -->
  <div id="loader" class="hidden text-center mt-5">
  <span class="loading loading-spinner loading-lg"></span>
</div>

<!-- Js File er angta  -->
<script src="./scripts/index.js"></script>
</body>
</html>
